services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hackernews-api:local
    container_name: hackernews-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Config overrides — double underscore is the IConfiguration nesting separator.
      # Uncomment and tweak as needed:
      # HackerNews__FetchConcurrency: "20"
      # HackerNews__IdListCacheSeconds: "60"
      # HackerNews__ItemCacheMinutes: "10"
      # HackerNews__EnableCacheWarmer: "true"
    restart: unless-stopped
